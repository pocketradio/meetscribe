summary_task:
  description: "Summarize the meeting transcript: {transcript}"
  expected_output: "A concise summary of key points and decisions"
  agent: summarizer

action_items_task:
  description: "Extract all action items from the transcript: {transcript}"
  expected_output: "A list of action items with owners and deadlines"
  agent: action_item_extractor

email_task:
  description: "Draft a follow-up email based on the summary and action items"
  expected_output: "A professional follow-up email"
  agent: email_drafter
